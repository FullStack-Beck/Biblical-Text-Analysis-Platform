<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        background: #0f172a; /* dark blue */
        color: #e2e8f0;
      }

      h1 {
        padding: 20px;
        margin: 0;
        font-size: 20px;
      }

      .container {
       display: flex;
       flex-direction: column;
       height: 100vh;
      }

      .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      select {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
        background: #1f2937;
        color: white;
        border: 1px solid #374151;
        border-radius: 6px;
      }

      .tabulator {
        background: #111827;
        border: none;
        color: #36435c;
        font-size: 13px;
      }

      .tabulator-table, .tabulator-header, .tabulator-row, .tabulator-header .tabulator-col {
        background: #111827 !important;
        color: #e2e8f0 !important;
      }

      .tabulator-header .tabulator-header-filter {
        background: #1f2937 !important;
      }

      .tabulator-header .tabulator-header-filter input {
        background: #1f2937 !important;
        color: #e2e8f0 !important;
        border: 1px solid #374151 !important;
      }

      .tabulator .tabulator-row {
        background: #111827;
        border-bottom: 1px solid #1f2937;
      }

      .tabulator .tabulator-row:hover {
        background: #1e293b;
      }

      .tabulator-cell {
        padding: 6px;
      }

      #tableContainer {
      height: 300px;   /* starting size */
      min-height: 150px;
      max-height: 80vh;
      overflow: auto;
      transition: height 0.05s ease-out;
      flex:1;
    }

    #resizer {
      height: 6px;
      background: #374151;
      cursor: row-resize;
      margin: 6px 0;
      border-radius: 3px;
    }

    #resizer:hover {
      background: #6b7280;
    }

    </style>
    <title>Biblical Data Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
  </head>
  <body>

    <h1>Biblical Dataset Explorer</h1>
      <div class="container">

        <!-- RIGHT: Data -->
        <div class="panel">
          <h3>Data</h3>

          <div id="tableContainer">
            <div id="table"></div>
          </div>

          <div id="resizer"></div>

    <script src="app.js"></script>
  </body>
</html>
