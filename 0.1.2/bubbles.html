<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Biblical Command Visualization</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Inter, sans-serif;
      overflow: hidden;
    }

    #canvasContainer {
      position: absolute;
      inset: 0;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    #toggleBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      cursor: pointer;
      opacity: 0.4;
      transition: 0.2s;
    }

    #toggleBtn:hover {
      opacity: 1;
    }

    #controls {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      height: 100vh;
      overflow-y: auto;
      background: #0f172a;
      border-right: 1px solid #1e293b;
      padding: 18px;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 900;
    }

    #controls.open {
      transform: translateX(0);
    }

    h2, h3 {
      margin-top: 0;
      color: #e2e8f0;
    }

    .section {
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 18px;
    }

    button,
    select,
    input {
      width: 100%;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      background: #1e293b;
      color: white;
      padding: 10px;
    }

    #detailPanel {
      position: fixed;
      right: 0;
      top: 0;
      width: 420px;
      height: 100vh;
      background: #0f172a;
      border-left: 1px solid #1e293b;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 1000;
      padding: 20px;
    }

    #detailPanel.open {
      transform: translateX(0);
    }

    #closePanel {
      border: none;
      background: #1e293b;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .command-card {
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
      border-left: 5px solid #3b82f6;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .detail-item {
      background: #1e293b;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 11px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    #searchTagsContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      min-height: 0;
    }

    .search-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1e40af;
      border: 1px solid #3b82f6;
      color: #bfdbfe;
      border-radius: 20px;
      padding: 3px 10px 3px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: default;
      white-space: nowrap;
    }

    .search-tag .tag-remove {
      cursor: pointer;
      color: #93c5fd;
      font-size: 13px;
      line-height: 1;
      margin-left: 2px;
      border-radius: 50%;
      padding: 0 2px;
    }

    .search-tag .tag-remove:hover {
      color: white;
      background: rgba(255,255,255,0.15);
    }

    #searchInput::placeholder {
      color: #64748b;
      font-size: 12px;
    }

    /* ── Collapsible legend sections ── */
    .legend-section {
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 18px;
    }

    .legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 4px 0 6px 0;
    }

    .legend-title {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-badge {
      background: #1e40af;
      color: #bfdbfe;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
    }

    .legend-chevron {
      color: #64748b;
      font-size: 11px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .legend-chevron.open {
      transform: rotate(180deg);
    }

    .legend-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-all-btn {
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 2px 7px;
      cursor: pointer;
      width: auto;
      margin: 0;
      white-space: nowrap;
      transition: 0.15s;
    }

    .legend-all-btn:hover {
      color: #e2e8f0;
      border-color: #64748b;
      background: #1e293b;
    }

    .legend-body {
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .legend-body.collapsed {
      max-height: 0 !important;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 12px;
      padding: 5px 6px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }

    .legend-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .legend-item.active {
      background: rgba(59,130,246,0.15);
      border-color: rgba(59,130,246,0.4);
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: box-shadow 0.12s;
    }

    .legend-item.active .legend-color {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
    }

    #statsBar {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(6px);
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 10px 14px;
      z-index: 500;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

<button id="toggleBtn">☰</button>

<div id="controls">

  <div class="section">
    <h2>Visualization</h2>

    <h3>Group By</h3>
    <select id="groupSelect">
      <option value="none">None</option>
      <option value="InOrder">InOrder</option>
      <option value="book">Book</option>
      <option value="speaker">Speaker</option>
      <option value="speaker_group">Speaker Group</option>
      <option value="source_authority">Source Authority</option>
      <option value="audience_scope">Audience Scope</option>
      <option value="audience_identity">Audience Identity</option>
      <option value="covenant">Covenant</option>
      <option value="command_form">Command Form</option>
      <option value="theological_theme">Theological Theme</option>
      <option value="literary_form">Literary Form</option>
      <option value="action_type">Action Type</option>
      <option value="speech_act">Speech Act</option>
      <option value="semantic_domain">Semantic Domain</option>
      <option value="polarity">Polarity</option>
    </select>

    <h3>Color By</h3>
    <select id="colorSelect"></select>

    <h3>Shape By</h3>
    <select id="shapeSelect"></select>

    <h3>Size By</h3>
    <select id="sizeSelect">
      <option value="cross_reference_count">Cross References</option>
      <option value="repetition_count">Repetition Count</option>
      <option value="confidence_score">Confidence</option>
    </select>

    <button onclick="resetView()">Reset View</button>
  </div>

  <div class="section">
    <h3>Search</h3>
    <div id="searchTagsContainer"></div>
    <input id="searchInput" placeholder="Type to filter · press Enter or use #tag to pin" />
  </div>

  <!-- Color Legend -->
  <div class="legend-section">
    <div class="legend-header" onclick="toggleLegendSection('color')">
      <div class="legend-title">
        Color Legend
        <span class="legend-badge" id="colorLegendBadge" style="display:none"></span>
      </div>
      <div class="legend-controls">
        <button class="legend-all-btn" id="colorAllBtn" onclick="event.stopPropagation(); toggleAllLegend('color')">Select All</button>
        <span class="legend-chevron open" id="colorChevron">▼</span>
      </div>
    </div>
    <div class="legend-body" id="colorLegendBody">
      <div id="colorLegend"></div>
    </div>
  </div>

  <!-- Shape Legend -->
  <div class="legend-section">
    <div class="legend-header" onclick="toggleLegendSection('shape')">
      <div class="legend-title">
        Shape Legend
        <span class="legend-badge" id="shapeLegendBadge" style="display:none"></span>
      </div>
      <div class="legend-controls">
        <button class="legend-all-btn" id="shapeAllBtn" onclick="event.stopPropagation(); toggleAllLegend('shape')">Select All</button>
        <span class="legend-chevron open" id="shapeChevron">▼</span>
      </div>
    </div>
    <div class="legend-body" id="shapeLegendBody">
      <div id="shapeLegend"></div>
    </div>
  </div>

  <!-- Relationship Filters -->
  <div class="legend-section">
    <div class="legend-header" onclick="toggleLegendSection('rel')">
      <div class="legend-title">
        Relationship Filters
        <span class="legend-badge" id="relLegendBadge" style="display:none"></span>
      </div>
      <div class="legend-controls">
        <button class="legend-all-btn" id="relAllBtn" onclick="event.stopPropagation(); toggleAllLegend('rel')">Select All</button>
        <span class="legend-chevron open" id="relChevron">▼</span>
      </div>
    </div>
    <button id="toggleRelationshipBtn">Toggle Relationships</button>
    <div class="legend-body" id="relLegendBody">
      <div id="relationshipFilters"></div>
    </div>
  </div>

</div>

<div id="canvasContainer">
  <svg id="canvas"></svg>
</div>

<div id="detailPanel">
  <button id="closePanel">✕</button>
  <div id="detailContent"></div>
</div>

<div id="statsBar">
  <div><strong id="nodeCount">0</strong> nodes loaded</div>
  <div><strong id="relationshipCount">0</strong> relationships loaded</div>
</div>

<script src="bubbles.js"></script>

</body>
</html>
