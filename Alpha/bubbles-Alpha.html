<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Biblical Command Visualization</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Inter, sans-serif;
      overflow: hidden;
    }

    #canvasContainer {
      position: absolute;
      inset: 0;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    #toggleBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      cursor: pointer;
      opacity: 0.4;
      transition: 0.2s;
    }

    #toggleBtn:hover {
      opacity: 1;
    }

    #controls {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      height: 100vh;
      overflow-y: auto;
      background: #0f172a;
      border-right: 1px solid #1e293b;
      padding: 18px;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 900;
    }

    #controls.open {
      transform: translateX(0);
    }

    h2, h3 {
      margin-top: 0;
      color: #e2e8f0;
    }

    .section {
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 18px;
    }

    button,
    select,
    input {
      width: 100%;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      background: #1e293b;
      color: white;
      padding: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 12px;
      padding: 4px;
      border-radius: 6px;
    }

    .legend-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    #detailPanel {
      position: fixed;
      right: 0;
      top: 0;
      width: 420px;
      height: 100vh;
      background: #0f172a;
      border-left: 1px solid #1e293b;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 1000;
      padding: 20px;
    }

    #detailPanel.open {
      transform: translateX(0);
    }

    #closePanel {
      border: none;
      background: #1e293b;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .command-card {
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
      border-left: 5px solid #3b82f6;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .detail-item {
      background: #1e293b;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 11px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    #statsBar {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(6px);
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 10px 14px;
      z-index: 500;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

<button id="toggleBtn">☰</button>

<div id="controls">

  <div class="section">
    <h2>Visualization</h2>

    <h3>Group By</h3>
    <select id="groupSelect">
      <option value="none">None</option>
      <option value="book">Book</option>
      <option value="speaker">Speaker</option>
      <option value="source_authority">Source Authority</option>
      <option value="audience_scope">Audience Scope</option>
      <option value="audience_identity">Audience Identity</option>
      <option value="covenant">Covenant</option>
      <option value="command_form">Command Form</option>
      <option value="theological_theme">Theological Theme</option>
      <option value="literary_form">Literary Form</option>
      <option value="action_type">Action Type</option>
      <option value="speech_act">Speech Act</option>
      <option value="semantic_domain">Semantic Domain</option>
      <option value="polarity">Polarity</option>
    </select>

    <h3>Color By</h3>
    <select id="colorSelect"></select>

    <h3>Shape By</h3>
    <select id="shapeSelect"></select>

    <h3>Size By</h3>
    <select id="sizeSelect">
      <option value="cross_reference_count">Cross References</option>
      <option value="repetition_count">Repetition Count</option>
      <option value="confidence_score">Confidence</option>
    </select>

    <button onclick="resetView()">Reset View</button>
  </div>

  <div class="section">
    <h3>Search</h3>
    <input id="searchInput" placeholder="Search scripture, summary, keyword..." />
  </div>

  <div class="section">
    <h3>Color Legend</h3>
    <div id="colorLegend"></div>
  </div>

  <div class="section">
    <h3>Relationship Filters</h3>
    <div id="relationshipFilters"></div>
  </div>

</div>

<div id="canvasContainer">
  <svg id="canvas"></svg>
</div>

<div id="detailPanel">
  <button id="closePanel">✕</button>
  <div id="detailContent"></div>
</div>

<div id="statsBar">
  <div><strong id="nodeCount">0</strong> nodes loaded</div>
  <div><strong id="relationshipCount">0</strong> relationships loaded</div>
</div>

<script src="bubbles-Alpha.js"></script>

</body>
</html>
