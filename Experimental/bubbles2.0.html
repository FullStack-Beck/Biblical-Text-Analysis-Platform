<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
    }

    #detailPanel {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: #111827;
      color: white;
      padding: 16px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 20;
      overflow-y: auto;
    }

    #detailPanel.open {
      transform: translateX(0);
    }

    #closePanel {
      background: #1f2937;
      border: none;
      color: white;
      padding: 6px 10px;
      cursor: pointer;
      margin-bottom: 10px;
      border-radius: 4px;
    }

    #detailContent h3 {
      margin-top: 0;
    }

    .detail-row {
      margin-bottom: 8px;
      font-size: 13px;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 11px;
    }

    .command-block {
      transition: all 0.2s ease;
    }

    .command-block:hover {
      background: #334155;
      transform: translateX(4px);
    }

    .detail-row {
      margin-top: 10px;
    }

    .detail-label {
      font-weight: bold;
      color: #94a3b8;
      font-size: 0.9em;
      margin-bottom: 4px;
    }

    /* 🔥 Drawer */
    #controls {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: #111827;
      padding: 12px;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 10;
      overflow-y: auto;
    }

    #controls.open {
      transform: translateX(0);
    }

    #toggleBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 40px;
      height: 40px;
      z-index: 1000;
      background: #1f2937;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
      opacity: 0.2;
    }


    #toggleBtn:hover {
        opacity: 1;
    }

    button {
      display: block;
      margin-bottom: 8px;
      width: 100%;
      background: #1f2937;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
      border-radius: 6px;
    }

    select {
      width: 100%;
      margin-bottom: 12px;
      padding: 6px;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #legend {
      margin-top: 10px;
      font-size: 12px;
    }

    /* Canvas */
    #canvasContainer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }

    svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<div id="controls">
  <h3>Group</h3>
    <button onclick="setGroup('none')">None</button>
    <button onclick="setGroup('book')">Book</button>
    <button onclick="setGroup('theological')">Theological</button>
    <button onclick="setGroup('action')">Action</button>
    <button onclick="setGroup('audience')">Audience</button>
    <button onclick="setGroup('polarity')">Polarity</button>
    <button onclick="setGroup('authority')">Authority</button>

  <h3>Color By</h3>
    <select onchange="setColorMode(this.value)">
      <option value="theological">Theological</option>
      <option value="action">Action</option>
      <option value="audience">Audience</option>
      <option value="polarity">Polarity</option>
      <option value="authority">Authority</option>
    </select>
  
  <h3>Color Legend</h3>
    <div id="colorLegend"></div>

  <h3>Shape By</h3>
    <select onchange="setSizeMode(this.value)">
      <option value="theological">Theological</option>
      <option value="action">Action</option>
      <option value="audience">Audience</option>
      <option value="polarity">Polarity</option>
      <option value="authority">Authority</option>
    </select>

  <h3>Shape Legend</h3>
    <div id="sizeLegend"></div>

  <button onclick="resetView()">Reset</button>
</div>

<div id="canvasContainer">
  <svg id="canvas"></svg>
</div>

<div id="detailPanel">
  <button id="closePanel">✕</button>
  <div id="detailContent"></div>
</div>

<script src="bubbles2.0.js"></script>

<script>
  document.getElementById("toggleBtn").onclick = () => {
    document.getElementById("controls").classList.toggle("open");
  };
</script>

</body>
</html>
