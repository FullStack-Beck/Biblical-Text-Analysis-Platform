<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
            background:  #0f172a;
        }
        .container {
            text-align: center;
            background: #2e4374;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .options {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 24px;
        }
        .option {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
        }
        .option.table { background: #0078d4; }
        .option.bubbles { background: #ea580c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Choose an option</h1>
        <p>Select either Table or Bubbles view.</p>
        <div class="options">
            <button class="option table" onclick="location.href='table.html'">Table</button>
            <button class="option bubbles" onclick="location.href='bubbles.html'">Bubbles</button>
        </div>
    </div>
</body>
</html>
